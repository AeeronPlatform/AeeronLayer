name: CI

  on:
    push:
      branches: [main]
    pull_request:
      branches: [main]

  concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

  jobs:
    typecheck:
      name: Typecheck
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: pnpm/action-setup@v4
          with:
            version: 9
        - uses: actions/setup-node@v4
          with:
            node-version: 24
            cache: pnpm
        - run: pnpm install --frozen-lockfile
        - run: pnpm run typecheck

    test-protocol:
      name: Protocol unit tests
      runs-on: ubuntu-latest
      needs: typecheck
      steps:
        - uses: actions/checkout@v4
        - uses: pnpm/action-setup@v4
          with: { version: 9 }
        - uses: actions/setup-node@v4
          with: { node-version: 24, cache: pnpm }
        - run: pnpm install --frozen-lockfile
        - run: pnpm --filter @aeeron/protocol run test

    test-anchor:
      name: Anchor program tests
      runs-on: ubuntu-latest
      needs: typecheck
      env:
        ANCHOR_WALLET: ~/.config/solana/id.json
        ANCHOR_PROVIDER_URL: http://127.0.0.1:8899
      steps:
        - uses: actions/checkout@v4
        - name: Install Solana CLI
          run: |
            sh -c "$(curl -sSfL https://release.solana.com/v1.18.26/install)"
            echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
        - name: Install Anchor CLI
          run: |
            npm install -g @coral-xyz/anchor-cli@0.30.1
        - uses: pnpm/action-setup@v4
          with: { version: 9 }
        - uses: actions/setup-node@v4
          with: { node-version: 24, cache: pnpm }
        - run: pnpm install --frozen-lockfile
        - name: Generate keypair
          run: solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json
        - name: Start localnet and run tests
          run: |
            solana-test-validator --reset --quiet &
            sleep 5
            anchor test --skip-local-validator --provider.cluster localnet
          working-directory: programs/aeeron-verifier

    lint:
      name: Lint
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: pnpm/action-setup@v4
          with: { version: 9 }
        - uses: actions/setup-node@v4
          with: { node-version: 24, cache: pnpm }
        - run: pnpm install --frozen-lockfile
        - run: pnpm run lint --if-present

    build-api:
      name: Build API
      runs-on: ubuntu-latest
      needs: [typecheck, test-protocol]
      steps:
        - uses: actions/checkout@v4
        - uses: pnpm/action-setup@v4
          with: { version: 9 }
        - uses: actions/setup-node@v4
          with: { node-version: 24, cache: pnpm }
        - run: pnpm install --frozen-lockfile
        - run: pnpm --filter @workspace/api-server run build
          env:
            NODE_ENV: production
            PORT: 5000
            BASE_PATH: /api
  