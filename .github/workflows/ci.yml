name: CI

  on:
    push:
      branches: [main, develop]
    pull_request:
      branches: [main]

  concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

  jobs:
    lint-and-typecheck:
      name: Lint & Typecheck
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - uses: pnpm/action-setup@v4
          with:
            version: 9

        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: pnpm

        - name: Install dependencies
          run: pnpm install --no-frozen-lockfile

        - name: Typecheck
          run: pnpm typecheck
          continue-on-error: true

        - name: Lint
          run: pnpm lint
          continue-on-error: true

    test-sdk:
      name: SDK Tests
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - uses: pnpm/action-setup@v4
          with:
            version: 9

        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: pnpm

        - name: Install dependencies
          run: pnpm install --no-frozen-lockfile

        - name: Run SDK tests
          run: pnpm --filter @aeeron/sdk test
          continue-on-error: true

    test-api:
      name: API Tests
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - uses: pnpm/action-setup@v4
          with:
            version: 9

        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: pnpm

        - name: Install dependencies
          run: pnpm install --no-frozen-lockfile

        - name: Run API tests
          run: pnpm --filter @aeeron/api test
          continue-on-error: true
          env:
            NODE_ENV: test
            SOLANA_NETWORK: devnet
            SKIP_VERIFICATION: "true"

    build-program:
      name: Build Solana Program
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: Install Rust
          uses: dtolnay/rust-toolchain@stable

        - name: Cache Rust dependencies
          uses: actions/cache@v4
          with:
            path: |
              ~/.cargo/registry
              ~/.cargo/git
              target
            key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

        - name: Check program compiles
          working-directory: programs/aeeron-protocol
          run: cargo check
          continue-on-error: true

    build-packages:
      name: Build TypeScript packages
      runs-on: ubuntu-latest
      needs: [lint-and-typecheck]
      steps:
        - uses: actions/checkout@v4

        - uses: pnpm/action-setup@v4
          with:
            version: 9

        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: pnpm

        - name: Install dependencies
          run: pnpm install --no-frozen-lockfile

        - name: Build
          run: pnpm build
          continue-on-error: true
  